<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Favicons -->
    <link href="/assests/logo.jpg" rel="icon" />
    <link href="/assests/logo.jpg" rel="apple-touch-icon" />

    <title id="pageTitle">Product | Premium collection</title>
    <meta content="" name="description" />
    <meta content="" name="keywords" />

    <!-- <link rel="stylesheet" href="homestyle.css"> -->
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>


    <div class="navbar">
        <div class="desktop-nav">
            <img src="/assests/logo.jpg" alt="unique industry logo" class="logo" />
            <h2 class="company-name">Unique Industry</h2>

            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/about/index.html">About</a></li>
                <li><a href="/product/index.html">Product</a></li>
                <li><a href="/contact/contact.html">Contact</a></li>
            </ul>
        </div>
        <!-- Mobile Nav (Dropdown box for mobile screens) -->
        <div class="mobile-nav">
            <div class="drop-down">
                <button class="drop-toggle">☰</button>
                <ul class="mobile-dropdown-menu">
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="/about/index.html">About</a></li>
                    <li><a href="/product/index.html">Products</a></li>
                    <li><a href="/contact/contact.html">Contact</a></li>
                </ul>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <!-- <h1>Premium Collection</h1> -->

    <div class="product-section">

        <div class="container">
            <div class="collection">
                <button class="menu-btn active" onclick="filterCategory('all', this)">All Products</button>
                <button class="menu-btn" onclick="filterCategory('linen', this)">Linen</button>
                <button class="menu-btn" onclick="filterCategory('cotton', this)">Cotton</button>
                <button class="menu-btn" onclick="filterCategory('wool', this)">Wool</button>
                <button class="menu-btn" onclick="filterCategory('silk', this)">Silk</button>
                <button class="menu-btn" onclick="filterCategory('denim', this)">Denim</button>
                <button class="menu-btn" onclick="filterCategory('trouser', this)">Trouser</button>
            </div>
        </div>

        <div class="container2">
            <div class="main-content">
                <h1 id="category-title">All Products</h1>
                <div class="products-grid" id="products-container"></div>
            </div>
        </div>


        <div class="modal-overlay" id="orderModal">
            <div class="modal-box">
                <button class="close-btn" id="closeModal">&times;</button>
                <h2>Place Your Order</h2>

                <form id="orderForm">
                    <input type="hidden" name="access_key" id="web3FormsKey"
                        value="778c1719-8969-4d35-91cd-17a827c8a9a2">
                    <input type="hidden" name="subject" id="emailSubject" value="New Textile Order Request">
                    <input type="checkbox" name="botcheck" class="hidden-honeypot" style="display: none;">

                    <div class="form-group">
                        <label for="productName">Selected Fabric / Product</label>
                        <input type="text" id="productName" name="Product Name" readonly>
                    </div>

                    <div class="form-group">
                        <label for="userName">Your Full Name</label>
                        <input type="text" id="userName" name="Customer Name" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="userEmail">Email Address</label>
                        <input type="email" id="userEmail" name="Customer Email" required
                            placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label for="quantity">Quantity (Meters / Units)</label>
                        <input type="number" id="quantity" name="Quantity Requested" required min="1" value="1">
                    </div>


                    <input type="hidden" id="totalPrice" name="Total Price Matched">
                    <div id="priceDisplay" style="margin: 15px 0; font-weight: bold; font-size: 1.2em; color: #2c3e50;">
                    </div>

                    <div class="form-group">
                        <label for="message">Special Requirements / Message</label>
                        <textarea id="message" name="Customer Message"
                            placeholder="Specify color codes, custom rolls, or delivery requests..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Confirm Order</button>
                </form>
            </div>
        </div>



    </div>

    <script src="script.js"></script>
</body>

</html>
