<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textile Product Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Our Premium Textile Collection</h1>

    <div class="product-grid" id="productGrid"></div>

    <div class="modal-overlay" id="orderModal">
        <div class="modal-box">
            <button class="close-btn" id="closeModal">&times;</button>
            <h2>Place Your Order</h2>
            
            <form id="orderForm">
                <input type="hidden" name="access_key" id="web3FormsKey" value="778c1719-8969-4d35-91cd-17a827c8a9a2">
                <input type="hidden" name="subject" id="emailSubject" value="New Textile Order Request">
                <input type="checkbox" name="botcheck" class="hidden-honeypot" style="display: none;">

                <div class="form-group">
                    <label for="productName">Selected Fabric / Product</label>
                    <input type="text" id="productName" name="Product Name" readonly>
                </div>
                
                <div class="form-group">
                    <label for="userName">Your Full Name</label>
                    <input type="text" id="userName" name="Customer Name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="userEmail">Email Address</label>
                    <input type="email" id="userEmail" name="Customer Email" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label for="quantity">Quantity (Meters / Units)</label>
                    <input type="number" id="quantity" name="Quantity Requested" required min="1" value="1">
                </div>
                
                <div class="form-group">
                    <label for="message">Special Requirements / Message</label>
                    <textarea id="message" name="Customer Message" placeholder="Specify color codes, custom rolls, or delivery requests..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">Confirm Order</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
