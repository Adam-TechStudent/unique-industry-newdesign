<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabric & Apparel Shop</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: #f4f6f9;
            min-height: 100vh;
        }

        /* Sidebar Style */
        .sidebar {
            width: 250px;
            background-color: #1e293b;
            color: #ffffff;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: #38bdf8;
        }

        .sidebar button {
            background: none;
            border: none;
            color: #cbd5e1;
            padding: 15px 25px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            border-left: 4px solid transparent;
            white-space: nowrap;
        }

        .sidebar button:hover {
            background-color: #334155;
            color: #ffffff;
        }

        .sidebar button.active {
            background-color: #334155;
            color: #38bdf8;
            border-left-color: #38bdf8;
            font-weight: bold;
        }

        /* Main Content & Cards Grid */
        .main-content {
            margin-left: 250px;
            padding: 40px;
            flex-grow: 1;
            width: calc(100% - 250px);
        }

        .main-content h1 {
            margin-bottom: 30px;
            color: #0f172a;
            text-transform: capitalize;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        /* Card Style */
        .card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-img-placeholder {
            width: 100%;
            height: 180px;
            background-color: #e2e8f0;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-weight: 500;
            text-transform: capitalize;
        }

        .card h3 {
            color: #1e293b;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .card .price {
            color: #059669;
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .order-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            width: 100%;
        }

        .order-btn:hover {
            background-color: #1d4ed8;
        }

        /* Responsive Fix Mobile & Tablets */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                top: 0;
                left: 0;
                padding: 10px 0 0 0;
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none; /* Hide scrollbar for Firefox */
            }
            
            .sidebar::-webkit-scrollbar {
                display: none; /* Hide scrollbar for Chrome/Safari */
            }

            .sidebar h2 {
                display: none; /* Hide 'Catalog' heading on mobile to save space */
            }

            .sidebar button {
                padding: 15px 20px;
                text-align: center;
                width: auto;
                border-left: none;
                border-bottom: 4px solid transparent;
            }

            .sidebar button.active {
                border-left-color: transparent;
                border-bottom-color: #38bdf8;
            }

            .main-content {
                margin-left: 0;
                margin-top: 55px; /* Pushes content down so sidebar header doesn't overlap */
                padding: 20px;
                width: 100%;
            }

            .main-content h1 {
                font-size: 1.75rem;
                margin-bottom: 20px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); /* 2 columns on small screens */
                gap: 15px;
            }
            
            .card {
                padding: 12px;
            }
            
            .card-img-placeholder {
                height: 130px;
            }

            .card h3 {
                font-size: 1rem;
            }
            
            .card .price {
                font-size: 1.1rem;
                margin-bottom: 10px;
            }
            
            .order-btn {
                padding: 8px 10px;
                font-size: 0.9rem;
            }
        }
        
        /* Minor adjustment for tiny screens */
        @media (max-width: 360px) {
            .products-grid {
                grid-template-columns: 1fr; /* Single column on exceptionally small devices */
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Catalog</h2>
        <button class="menu-btn active" onclick="filterCategory('all', this)">All Products</button>
        <button class="menu-btn" onclick="filterCategory('linen', this)">Linen</button>
        <button class="menu-btn" onclick="filterCategory('cotton', this)">Cotton</button>
        <button class="menu-btn" onclick="filterCategory('wool', this)">Wool</button>
        <button class="menu-btn" onclick="filterCategory('silk', this)">Silk</button>
        <button class="menu-btn" onclick="filterCategory('denim', this)">Denim</button>
        <button class="menu-btn" onclick="filterCategory('trouser', this)">Trouser</button>
    </div>

            { id: 40, name: "Denim Jacket", price: "$79.99", category: "denim" }
        ];

        const container = document.getElementById('products-container');
        const title = document.getElementById('category-title');

        function renderProducts(filteredList) {
            container.innerHTML = ""; 
            
            filteredList.forEach(product => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img-placeholder">${product.category}</div>
                    <h3>${product.name}</h3>
                    <div class="price">${product.price}</div>
                    <button class="order-btn" onclick="placeOrder('${product.name}')">Order Now</button>
                `;
                container.appendChild(card);
            });
        }

        function filterCategory(category, buttonElement) {
            const buttons = document.querySelectorAll('.menu-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            title.textContent = category === 'all' ? 'All Products' : category;

            if (category === 'all') {
                renderProducts(products);
            } else {
                const filtered = products.filter(p => p.category === category);
                renderProducts(filtered);
            }
            
            // Auto scroll main content area back to the top when swapping categories on mobile
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function placeOrder(productName) {
            alert(`Thank you! Your order for "${productName}" has been received.`);
        }

        renderProducts(products);
    </script>
</body>
</html>
